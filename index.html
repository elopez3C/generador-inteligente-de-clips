<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Clip Master V1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
    /* Restore MUI cursors when agentation crosshair mode is active */
    #root button, #root a, #root [role="button"], #root label,
    #root input, #root textarea, #root select,
    #root .MuiButtonBase-root, #root .MuiSlider-root,
    #root .MuiIconButton-root, #root .MuiMenuItem-root {
      cursor: pointer !important;
    }
    #root input, #root textarea, #root [contenteditable="true"] {
      cursor: text !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</body>
</html>
